services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: npcws
      POSTGRES_USER: npcws
      POSTGRES_PASSWORD: npcws_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations
      - ./db/seeds:/docker-entrypoint-initdb.d/seeds

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: npcws
      DB_USER: npcws
      DB_PASSWORD: npcws_dev
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - db

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  pgdata:
