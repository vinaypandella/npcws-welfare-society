name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: rm -f package-lock.json client/package-lock.json && npm install
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
