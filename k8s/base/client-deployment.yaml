apiVersion: apps/v1
kind: Deployment
metadata:
  name: npcws-client
  namespace: npcws
  labels:
    app: npcws-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: npcws-client
  template:
    metadata:
      labels:
        app: npcws-client
    spec:
      containers:
        - name: client
          image: REGION-docker.pkg.dev/PROJECT_ID/npcws/client:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: npcws-client
  namespace: npcws
spec:
  selector:
    app: npcws-client
  ports:
    - port: 80
      targetPort: 80
